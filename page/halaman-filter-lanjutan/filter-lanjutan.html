<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILIH.IN - Filter Lanjutan</title>
    <link rel="stylesheet" href="../../assets/restu.css">
</head>
<body>

    <!-- NAVBAR FIXED -->
    <nav class="navbar">
        <div class="nav-kanan">
            <a href="#" class="logo">PILIH.IN</a>
            <a href="../halaman-all-film/halaman-all-film-1.html">Katalog</a>
            <a href="about.html">About Us</a>
            <a href="artikel.html">Artikel</a>
            <a href="berita.html">Berita</a>
        </div>
        <div class="nav-kiri">
            <div class="profil-wrapper">
                <div class="avatar">P</div>
                <span class="nama-pengguna">Pengguna</span>
            </div>
            <a href="login.html" class="btn-keluar">Keluar</a>
        </div>
    </nav>

    <!-- KONTEN UTAMA (KIRI: FILTER, KANAN: HASIL) -->
    <div class="container-utama">
        
        <!-- SIDEBAR FILTER -->
        <div class="sidebar-filter">
            <h2>Filter Lanjutan</h2>
            
            <form id="formFilter">
                <!-- Filter Genre (Checkbox) -->
                <div class="grup-filter">
                    <h3>Genre</h3>
                    <label class="opsi-filter"><input type="checkbox" name="genre" value="action"> Action</label>
                    <label class="opsi-filter"><input type="checkbox" name="genre" value="comedy"> Comedy</label>
                    <label class="opsi-filter"><input type="checkbox" name="genre" value="drama"> Drama</label>
                    <label class="opsi-filter"><input type="checkbox" name="genre" value="horror"> Horror</label>
                    <label class="opsi-filter"><input type="checkbox" name="genre" value="romance"> Romance</label>
                </div>

                <!-- Filter Tahun Rilis (Radio) -->
                <div class="grup-filter">
                    <h3>Tahun Rilis</h3>
                    <label class="opsi-filter"><input type="radio" name="tahun" value="semua" checked> Semua Tahun</label>
                    <label class="opsi-filter"><input type="radio" name="tahun" value="atas_2020"> 2020 ke Atas</label>
                    <label class="opsi-filter"><input type="radio" name="tahun" value="bawah_2020"> 2020 ke Bawah</label>
                </div>

                <!-- Filter Rating Usia (Radio) -->
                <div class="grup-filter">
                    <h3>Rating Usia</h3>
                    <label class="opsi-filter"><input type="radio" name="rating" value="semua" checked> Semua Umur</label>
                    <label class="opsi-filter"><input type="radio" name="rating" value="13"> 13+</label>
                    <label class="opsi-filter"><input type="radio" name="rating" value="17"> 17+</label>
                    <label class="opsi-filter"><input type="radio" name="rating" value="21"> 21+</label>
                </div>

                <!-- Tombol Aksi -->
                <div class="grup-tombol">
                    <!-- Memanggil fungsi terapkanFilter() di JS -->
                    <button type="button" class="btn-terapkan" onclick="terapkanFilterLanjutan()">Terapkan Filter</button>
                    <!-- Type reset untuk membersihkan form, lalu jalankan fungsi JS untuk reset data -->
                    <button type="reset" class="btn-reset" onclick="resetFilterLanjutan()">Reset</button> 
                </div>
            </form>
        </div>

        <!-- AREA HASIL PENCARIAN -->
        <div class="area-hasil-filter">
            <div class="header-hasil">
                <h1 id="judul-hasil">Hasil Pencarian</h1>
                <span id="teks-jumlah">Menampilkan 10 film</span>
            </div>

            <!-- Atribut data-genre, data-tahun, dan data-rating digunakan oleh JS -->
            <div class="grid-hasil" id="kontainer-film">
                
                <a href="detail_film.html" class="kartu-film" data-genre="action" data-tahun="2022" data-tanggal="2022-01-01" data-populer="70" data-rating="8.3">
                    <div class="bungkus-poster">
                        <img src="../../assets/img/top_gun_maverick.png" alt="Top Gun" class="poster-film" >
                        <div class="overlay-play">
                            <span class="ikon-play">▶</span>
                        </div>
                    </div>
                    <div class="judul-film">Top Gun: Maverick</div>
                    <div class="meta-film-lengkap">
                        <div class="meta-baris">
                            <span>Action</span>
                            <span>2022</span>
                        </div>
                        <div class="meta-baris">
                            <span class="badge-usia">13+</span>
                            <span class="rating-bintang">★ 8.3</span>
                        </div>
                    </div>
                </a>
                

            </div>
        </div>

    </div>

    <!-- JAVASCRIPT UNTUK FITUR FILTER LANJUTAN -->
    <script src="../../assets/restu.js"></script>
</body>
</html>
